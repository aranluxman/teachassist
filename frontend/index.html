<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#f2f2f7" />
    <meta
      name="description"
      content="Sign in to Grade Dashboard to track courses, marks, and term progress from your phone."
    />
    <title>Grade Dashboard - Sign in</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/app-icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="auth-wrap">
      <div class="auth-logo">
        <div class="mark">G</div>
        <h1>Grade Dashboard</h1>
        <p id="auth-subtitle">Sign in to track your marks</p>
      </div>

      <div class="auth-card">
        <form id="auth-form" autocomplete="on">
          <div class="field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              minlength="6"
              autocomplete="current-password"
            />
          </div>

          <div class="error-text" id="auth-error"></div>

          <button type="submit" class="btn" id="auth-submit">Sign In</button>
        </form>
      </div>

      <div class="auth-toggle">
        <span id="toggle-text">Don't have an account?</span>
        <button type="button" id="toggle-mode">Sign Up</button>
      </div>
    </div>

    <!-- Supabase JS (CDN, UMD build → exposes window.supabase). Must load
         before the module scripts below. -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- App modules -->
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
