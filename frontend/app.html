<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#f2f2f7" />
    <title>TeachAssist</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/app-icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="app-topbar">
        <a class="app-brand" href="app.html" aria-label="TeachAssist home">
          <span class="app-mark">TA</span>
          <span class="app-brand-text">
            <span class="app-name">TeachAssist</span>
            <span class="app-status">Updated just now</span>
          </span>
        </a>
      </header>

      <!-- Each "screen" is rendered into by a JS module. Only one is visible. -->
      <main id="screen-courses" class="screen">
        <div class="center-loader"><span class="spinner"></span></div>
      </main>
      <main id="screen-detail" class="screen hidden"></main>
      <main id="screen-guidance" class="screen hidden"></main>
      <main id="screen-science" class="screen hidden"></main>
      <main id="screen-links" class="screen hidden"></main>
      <main id="screen-settings" class="screen hidden"></main>

      <nav class="tabbar" id="tabbar">
        <button data-tab="courses" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v15H5.5A1.5 1.5 0 0 0 4 20.5z" />
            <path d="M20 5.5A1.5 1.5 0 0 0 18.5 4H13v15h5.5A1.5 1.5 0 0 1 20 20.5z" />
          </svg>
          Courses
        </button>
        <button data-tab="guidance">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="8" r="3" />
            <path d="M3.5 20a5.5 5.5 0 0 1 11 0" />
            <path d="M16 4.5a3 3 0 0 1 0 6M20.5 20a5.5 5.5 0 0 0-4-5.3" />
          </svg>
          Guidance
        </button>
        <button data-tab="links">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.5 1.5M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7L12 19" />
          </svg>
          Links
        </button>
        <button data-tab="science">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 2v6L5 18a3 3 0 0 0 2.7 4h8.6A3 3 0 0 0 19 18L14 8V2" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M8 14h8" stroke-linecap="round" />
            <path d="M9 2h6" stroke-linecap="round" />
          </svg>
          Science
        </button>
        <button data-tab="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 7 19.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0-1.2-2.9H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.7 7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H10a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 2.9 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V10a1.7 1.7 0 0 0 1.6 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" />
          </svg>
          Settings
        </button>
      </nav>
    </div>

    <div id="modal-root"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.js"></script>
    <script type="module">
      import { requireLogin, getCourses } from "./js/ta-client.js";
      import { renderCourses } from "./js/courses.js";
      import { openCourseDetail } from "./js/course-detail.js";
      import { renderGuidance } from "./js/guidance.js";
      import { renderScienceAnalytics } from "./js/science-analytics.js";
      import { renderLinks } from "./js/links.js";
      import { renderSettings, applyStoredTheme } from "./js/settings.js";

      const screens = {
        courses: document.getElementById("screen-courses"),
        detail: document.getElementById("screen-detail"),
        guidance: document.getElementById("screen-guidance"),
        science: document.getElementById("screen-science"),
        links: document.getElementById("screen-links"),
        settings: document.getElementById("screen-settings"),
      };
      const tabbar = document.getElementById("tabbar");

      function showScreen(name) {
        for (const [k, elx] of Object.entries(screens)) elx.classList.toggle("hidden", k !== name);
        tabbar.querySelectorAll("button").forEach((b) =>
          b.classList.toggle("active", b.dataset.tab === name)
        );
        const tabbed = ["courses", "guidance", "science", "links", "settings"].includes(name);
        tabbar.classList.toggle("hidden", !tabbed);
        window.scrollTo(0, 0);
      }

      window.AppNav = {
        toCourses: async () => { showScreen("courses"); await renderCourses(screens.courses); },
        toGuidance: async () => { showScreen("guidance"); await renderGuidance(screens.guidance); },
        toScience: async () => { showScreen("science"); await renderScienceAnalytics(screens.science); },
        toLinks: async () => { showScreen("links"); await renderLinks(screens.links); },
        toSettings: async () => { showScreen("settings"); await renderSettings(screens.settings); },
        toDetail: async (course) => { showScreen("detail"); await openCourseDetail(screens.detail, course); },
      };

      tabbar.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-tab]");
        if (!btn) return;
        ({
          courses: window.AppNav.toCourses,
          guidance: window.AppNav.toGuidance,
          science: window.AppNav.toScience,
          links: window.AppNav.toLinks,
          settings: window.AppNav.toSettings,
        })[btn.dataset.tab]();
      });

      (async () => {
        if (!requireLogin()) return;
        applyStoredTheme();
        await window.AppNav.toCourses();
      })();
    </script>
  </body>
</html>
