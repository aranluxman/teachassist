<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#f2f2f7" />
    <meta
      name="description"
      content="A mobile-first dashboard for tracking courses, grades, term dates, and student links."
    />
    <title>Grade Dashboard</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/app-icon.svg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="shell">
      <!-- Each "screen" is rendered into by a JS module. Only one is visible. -->
      <main id="screen-courses" class="screen">
        <div class="center-loader"><span class="spinner"></span></div>
      </main>
      <main id="screen-detail" class="screen hidden"></main>
      <main id="screen-links" class="screen hidden"></main>
      <main id="screen-settings" class="screen hidden"></main>

      <!-- Floating add-course button (shown only on the Courses screen) -->
      <button class="fab" id="fab" aria-label="Add course">+</button>

      <!-- Bottom tab bar -->
      <nav class="tabbar" id="tabbar">
        <button data-tab="courses" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" />
          </svg>
          Courses
        </button>
        <button data-tab="links">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.5 1.5M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7L12 19"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Links
        </button>
        <button data-tab="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 7 19.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0-1.2-2.9H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.7 7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H10a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 2.9 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V10a1.7 1.7 0 0 0 1.6 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Settings
        </button>
      </nav>
    </div>

    <!-- Modal/bottom-sheet host -->
    <div id="modal-root"></div>

    <!-- Third-party libraries from CDN (UMD globals). Must load before modules. -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.js"></script>

    <!-- App orchestrator: auth gate, screen routing, tab bar wiring. -->
    <script type="module">
      import { requireAuth } from "./js/auth.js";
      import { renderCourses, openCourseForm } from "./js/courses.js";
      import { openCourseDetail } from "./js/course-detail.js";
      import { renderLinks } from "./js/links.js";
      import { renderSettings, applyStoredTheme } from "./js/settings.js";

      const screens = {
        courses: document.getElementById("screen-courses"),
        detail: document.getElementById("screen-detail"),
        links: document.getElementById("screen-links"),
        settings: document.getElementById("screen-settings"),
      };
      const tabbar = document.getElementById("tabbar");
      const fab = document.getElementById("fab");

      // Show one screen; manage tab-bar + FAB visibility.
      function showScreen(name) {
        for (const [k, el] of Object.entries(screens)) {
          el.classList.toggle("hidden", k !== name);
        }
        tabbar.querySelectorAll("button").forEach((b) =>
          b.classList.toggle("active", b.dataset.tab === name)
        );
        const tabbed = ["courses", "links", "settings"].includes(name);
        tabbar.classList.toggle("hidden", !tabbed);
        fab.classList.toggle("hidden", name !== "courses");
        window.scrollTo(0, 0);
      }

      // Minimal navigation API used by the view modules (keeps them decoupled).
      window.AppNav = {
        toCourses: async () => {
          showScreen("courses");
          await renderCourses(screens.courses);
        },
        toLinks: async () => {
          showScreen("links");
          await renderLinks(screens.links);
        },
        toSettings: async () => {
          showScreen("settings");
          await renderSettings(screens.settings);
        },
        toDetail: async (courseId) => {
          showScreen("detail");
          await openCourseDetail(screens.detail, courseId);
        },
        refreshCourses: async () => {
          await renderCourses(screens.courses);
        },
      };

      tabbar.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-tab]");
        if (!btn) return;
        ({
          courses: window.AppNav.toCourses,
          links: window.AppNav.toLinks,
          settings: window.AppNav.toSettings,
        })[btn.dataset.tab]();
      });

      fab.addEventListener("click", () => openCourseForm(null));

      // Boot: require a session, then load the Courses screen.
      (async () => {
        const user = await requireAuth(); // redirects to index.html if none
        if (!user) return;
        applyStoredTheme();
        await window.AppNav.toCourses();
      })();
    </script>
  </body>
</html>
